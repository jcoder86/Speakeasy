<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Chat</h1>
    <button id="view-toggle" type="button">To-do</button>
  </header>

  <main>
    <section id="chat-view">
      <div id="messages" class="list"></div>
    </section>
    <section id="todo-view" hidden>
      <div id="todos" class="list"></div>
      <p id="todo-empty" class="empty-hint">Nog geen to-do's. Voeg er een toe vanuit de chat met "Add to-do".</p>
    </section>
  </main>

  <form id="composer">
    <textarea id="input" rows="1" autofocus placeholder="Typ een bericht…"></textarea>
    <input id="image-input" type="file" accept="image/png,image/jpeg,image/gif,image/webp" hidden />
    <div class="composer-buttons">
      <button id="upload-btn" type="button">Afbeelding</button>
      <button id="addtodo-btn" type="button">Add to-do</button>
      <button id="send-btn" type="submit">Send</button>
    </div>
  </form>

  <div id="lightbox" class="lightbox" hidden>
    <img id="lightbox-img" alt="Afbeelding op volledig formaat" />
  </div>

  <script src="app.js"></script>
</body>
</html>

services:
  speakeasy:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
    # Volume bevat zowel chat.db als uploads/ — blijft behouden bij rebuilds.
    volumes:
      - speakeasy-data:/data
    restart: unless-stopped

volumes:
  speakeasy-data:
